        logging:
          level: info
          enable_query_log: true
          enable_metrics: true
      milvus:
        connection:
          host: vllm-sr-milvus
          port: 19530
          database: default
          timeout: 30
          auth:
            enabled: true
            username: root
            password: milvus-secret
          tls:
            enabled: false
            cert_file: certs/milvus.crt
            key_file: certs/milvus.key
            ca_file: certs/ca.crt
        collection:
          name: semantic_cache
          description: セマンティックキャッシュ用ベクトル。
          vector_field:
            name: embedding
            dimension: 768
            metric_type: COSINE
          index:
            type: HNSW
            params:
              M: 16
              efConstruction: 200
        search:
          params:
            ef: 64
          topk: 10
          consistency_level: Bounded
        performance:
          connection_pool:
            max_connections: 20
            max_idle_connections: 10
            acquire_timeout: 10
          batch:
            insert_batch_size: 128
            timeout: 30
        data_management:
          ttl:
            enabled: true
            timestamp_field: created_at
            cleanup_interval: 3600
          compaction:
            enabled: true
            interval: 86400
        logging:
          level: info
          enable_query_log: true
          enable_metrics: true
        development:
          drop_collection_on_startup: false
          auto_create_collection: true
          verbose_errors: true
      valkey:
        connection:
          host: valkey
          port: 6379
          database: 0
          password: valkey-secret
          timeout: 5
          tls:
            enabled: false
            cert_file: certs/valkey.crt
            key_file: certs/valkey.key
            ca_file: certs/ca.crt
        index:
          name: semantic_cache_idx
          prefix: "vsr:cache:"
          vector_field:
            name: embedding
            dimension: 768
            metric_type: COSINE
          index_type: HNSW
          params:
            M: 16
            efConstruction: 200
        search:
          topk: 10
        development:
          drop_index_on_startup: false
          auto_create_index: true
          verbose_errors: true
        logging:
          level: info
          enable_query_log: true
