        index_m: 16
        index_ef_construction: 200
      qdrant:
        host: qdrant
        port: 6334
        api_key: ""
        use_tls: false
        connect_timeout: 10
        collection_prefix: "vsr_vs_"
      metadata_store: memory
      metadata_postgres:
        host: postgres
        port: 5432
        database: vsr
        user: router
        password: router-secret
        ssl_mode: disable
        max_open_conns: 25
        max_idle_conns: 5
        conn_max_lifetime: 300
        table_name: vector_store_registry

  integrations:
    tools:
      enabled: true
      top_k: 5
      similarity_threshold: 0.35
      tools_db_path: deploy/examples/runtime/tools/tools_db.json
      fallback_to_empty: true
      advanced_filtering:
        enabled: true
        retrieval_strategy: weighted
        candidate_pool_size: 50
        min_lexical_overlap: 1
        min_combined_score: 0.42
        weights:
          embed: 0.5
          lexical: 0.2
          tag: 0.1
          name: 0.1
          category: 0.1
        use_category_filter: true
        category_confidence_threshold: 0.7
        allow_tools: [docs.search, tickets.lookup]
        block_tools: [admin.delete]
        hybrid_history:
          history_horizon: 8
          min_history_steps: 1
          history_confidence_threshold: 0
          weight_semantic: 1
          weight_history_transition: 1
          weight_decision_prior: 1
          repetition_penalty_strength: 0
    looper:
      # confidence/remom/fusion/workflows はここへ自己ループでチャット補完を
      # 投げ直す。この deployment は vllm-sr serve の split topology
      # (router container と envoy container が別プロセス) なので、
      # localhost:8899 (単一コンテナ/デフォルト値) ではなく、実際の listener
      # (http-8801) を持つ envoy コンテナのサービス名で到達する必要がある。
      endpoint: http://vllm-sr-envoy-container:8801/v1/chat/completions
      grpc_max_msg_size_mb: 16
      timeout_seconds: 120
      retry_count: 2
      headers:
        X-Trace-Source: looper
      remom:
        model_names:
          - vllm-sr/remom
      fusion:
        model_names:
          - vllm-sr/fusion
      flow:
        model_names:
          - vllm-sr/flow
        state:
          store_backend: redis
          ttl_seconds: 1800
          file:
            directory: .vllm-sr/flow-state
          redis:
            address: redis:6379
            db: 4
            password: redis-secret
            use_tls: false
            tls_skip_verify: false
            max_retries: 3
            pool_size: 10
            key_prefix: "vllm-sr:flow:state:"

  model_catalog:
    embeddings:
      semantic:
        qwen3_model_path: models/mom-embedding-pro
        gemma_model_path: models/mom-embedding-flash
        mmbert_model_path: models/mmbert-embed-32k-2d-matryoshka
        multimodal_model_path: models/mom-embedding-multimodal
        bert_model_path: models/mom-embedding-light
        use_cpu: true
        embedding_config:
          backend: candle
          model_type: mmbert
          preload_embeddings: true
          target_dimension: 768
          target_layer: 22
          enable_soft_matching: true
          top_k: 1
          min_score_threshold: 0.45
          prototype_scoring:
            enabled: true
            cluster_similarity_threshold: 0.9
            max_prototypes: 8
            best_weight: 0.75
            top_m: 2
            margin_threshold: 0.0
        endpoint:
          base_url: http://embedding-service:8000/v1
          model: BAAI/bge-m3
          api_key_env: EMBEDDING_API_KEY
          timeout_seconds: 5
          max_retries: 2
          dimensions: 1024
    system:
      # 日本語版フルファインチューニングモデル（cl-nagoya/ruri-v3-30m ベース）。
      # 学習方法: src/training/model_classifier/ja_full_finetuning/README.md を参照。
      prompt_guard: models/ja-full-jailbreak-detector-ruri-v3-30m
      domain_classifier: models/ja-full-domain-classifier-ruri-v3-30m
      intent_classifier: models/ja-full-intent-classifier-ruri-v3-30m
      pii_classifier: models/ja-full-pii-detector-ruri-v3-30m
      fact_check_classifier: models/mmbert32k-factcheck-classifier-merged
      hallucination_detector: models/mom-halugate-detector
      hallucination_explainer: models/mom-halugate-explainer
      feedback_detector: models/mmbert32k-feedback-detector-merged
    external:
      - llm_provider: openai
        model_role: guardrail
        llm_endpoint:
          address: openai-proxy
          port: 443
          protocol: https
          name: openai-guardrail
          use_chat_template: true
          prompt_template: "{{ .Prompt }}"
        llm_model_name: gpt-4.1-mini
        llm_timeout_seconds: 30
        parser_type: json
        threshold: 0.65
        access_key: external-guardrail-key
        max_tokens: 2048
        temperature: 0.2
    kbs:
      - name: privacy_kb
        source:
          path: knowledge_bases/privacy/
          manifest: labels.json
        threshold: 0.55
        prototype_scoring:
          enabled: true
          cluster_similarity_threshold: 0.9
          max_prototypes: 8
          best_weight: 0.75
          top_m: 2
          margin_threshold: 0.0
        label_thresholds:
          prompt_injection: 0.7
        groups:
          security_containment:
            - prompt_injection
            - credential_exfiltration
            - jailbreak_role
            - system_prompt_extraction
          privacy_policy:
            - proprietary_code
            - internal_document
            - pii
            - business_strategy
            - trade_secret_ip
            - operational_infrastructure
            - locality_directive
            - customer_data
          frontier_reasoning:
            - architecture_analysis
            - root_cause_analysis
            - multi_step_tradeoffs
          local_standard:
            - generic_coding
            - simple_task
            - general_knowledge
          private:
            - prompt_injection
            - credential_exfiltration
            - jailbreak_role
            - system_prompt_extraction
            - proprietary_code
            - internal_document
            - pii
            - business_strategy
            - trade_secret_ip
            - operational_infrastructure
            - locality_directive
            - customer_data
          public:
            - architecture_analysis
            - root_cause_analysis
            - multi_step_tradeoffs
            - generic_coding
            - simple_task
            - general_knowledge
        metrics:
          - name: private_vs_public
            type: group_margin
            positive_group: private
            negative_group: public
      - name: mmlu_kb
        source:
          path: knowledge_bases/mmlu/
          manifest: labels.json
        threshold: 0.25
        groups:
          escalate:
            - biology
            - business
            - computer science
            - economics
            - history
            - math
            - other
            - philosophy
            - psychology
          keep:
            - chemistry
            - engineering
            - health
            - law
            - physics
        metrics:
          - name: escalate_vs_keep
            type: group_margin
            positive_group: escalate
            negative_group: keep
    modules:
      prompt_compression:
        enabled: true
        # Built-in profile for scoring/preserve defaults: default, coding, medical,
        # security, or multi_turn. The multi-turn alias is normalized to multi_turn.
        # Unknown profiles fail config validation. Explicit weights override the profile.
        profile: default
        max_tokens: 4096
        min_length: 512
        skip_signals: [jailbreak, pii]
        textrank_weight: 0.4
        position_weight: 0.2
        tfidf_weight: 0.3
        novelty_weight: 0.1
        position_depth: 0.1
        preserve_first_n: 3
        preserve_last_n: 2
      prompt_guard:
        enabled: true
        model_ref: prompt_guard
        model_id: models/ja-full-jailbreak-detector-ruri-v3-30m
        threshold: 0.7
        use_cpu: true
        use_modernbert: true
        use_mmbert_32k: false
        jailbreak_mapping_path: models/ja-full-jailbreak-detector-ruri-v3-30m/jailbreak_type_mapping.json
        use_vllm: false
      classifier:
        domain:
          model_ref: domain_classifier
          model_id: models/ja-full-domain-classifier-ruri-v3-30m
          threshold: 0.5
          use_cpu: true
          use_modernbert: true
          use_mmbert_32k: false
          category_mapping_path: models/ja-full-domain-classifier-ruri-v3-30m/category_mapping.json
          fallback_category: other
        intent:
          model_ref: intent_classifier
          model_id: models/ja-full-intent-classifier-ruri-v3-30m
          threshold: 0.5
          use_cpu: true
          use_modernbert: true
          use_mmbert_32k: false
          category_mapping_path: models/ja-full-intent-classifier-ruri-v3-30m/category_mapping.json
          fallback_category: no_function_needed
        mcp:
          enabled: true
          transport_type: stdio
          command: python
          args: [-m, mcp_classifier]
          env:
            MCP_MODE: local
          url: http://localhost:9010
          tool_name: classify
          threshold: 0.6
          timeout_seconds: 15
        pii:
          model_ref: pii_classifier
          model_id: models/ja-full-pii-detector-ruri-v3-30m
          threshold: 0.9
          use_cpu: true
          use_mmbert_32k: false
          pii_mapping_path: models/ja-full-pii-detector-ruri-v3-30m/pii_type_mapping.json
        preference:
          use_contrastive: true
          embedding_model: mmbert
          prototype_scoring:
            enabled: true
            cluster_similarity_threshold: 0.9
            max_prototypes: 8
            best_weight: 0.75
            top_m: 2
            margin_threshold: 0.0
      complexity:
        prototype_scoring:
          enabled: true
          cluster_similarity_threshold: 0.9
          max_prototypes: 6
          best_weight: 0.75
          top_m: 2
          margin_threshold: 0.0
      hallucination_mitigation:
        enabled: true
        on_hallucination_detected: annotate
        fact_check:
          model_ref: fact_check_classifier
          model_id: models/mmbert32k-factcheck-classifier-merged
          threshold: 0.65
          use_cpu: true
          use_mmbert_32k: true
        detector:
          model_ref: hallucination_detector
          model_id: models/mom-halugate-detector
          threshold: 0.82
          use_cpu: true
          min_span_length: 2
          min_span_confidence: 0.6
          context_window_size: 50
          enable_nli_filtering: true
          nli_entailment_threshold: 0.75
        explainer:
          model_ref: hallucination_explainer
          model_id: models/mom-halugate-explainer
          threshold: 0.9
          use_cpu: true
      feedback_detector:
        enabled: true
        model_ref: feedback_detector
        model_id: models/mmbert32k-feedback-detector-merged
        threshold: 0.7
        use_cpu: true
        use_modernbert: false
        use_mmbert_32k: true
        feedback_mapping_path: models/mmbert32k-feedback-detector-merged/feedback_mapping.json
      modality_detector:
        enabled: true
        prompt_prefixes:
          - 画像を生成
          - 描いて
          - 絵を作成
        method: hybrid
        classifier:
          model_path: models/mmbert32k-modality-router-merged
          use_cpu: true
        keywords:
          - 画像
          - 写真
          - イラスト
        both_keywords:
          - 説明して図示
          - 画像付きで説明
        confidence_threshold: 0.7
        lower_threshold_ratio: 0.7
