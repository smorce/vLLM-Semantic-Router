      max_file_size_mb: 100
      embedding_model: multimodal
      embedding_dimension: 384
      ingestion_workers: 4
      supported_formats: [.txt, .md, .json, .csv, .html, .pdf]
      milvus:
        connection:
          host: milvus
          port: 19530
          database: vector_store
          timeout: 30
          auth:
            enabled: true
            username: root
            password: milvus-secret
          tls:
            enabled: false
            cert_file: certs/milvus.crt
            key_file: certs/milvus.key
            ca_file: certs/ca.crt
        collection:
          name: vector_store
          description: アップロード済みドキュメントの embedding。
          vector_field:
            name: embedding
            dimension: 384
            metric_type: COSINE
          index:
            type: HNSW
            params:
              M: 16
              efConstruction: 200
        search:
          params:
            ef: 64
          topk: 10
          consistency_level: Strong
        performance:
          connection_pool:
            max_connections: 20
            max_idle_connections: 10
