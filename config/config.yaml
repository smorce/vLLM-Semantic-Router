      auto_store: true
      disabled_routes: []
      disabled_models: []
      valkey:
        host: valkey
        port: 6379
        database: 0
        password: valkey-secret
        timeout: 10
        collection_prefix: "mem:"
        index_name: mem_idx
        dimension: 384
        metric_type: COSINE
        index_m: 16
        index_ef_construction: 200
        tls_enabled: false
        tls_ca_path: ""
        tls_insecure_skip_verify: false
      milvus:
        address: vllm-sr-milvus:19530
        collection: agentic_memory
        dimension: 384
        num_partitions: 32
      qdrant:
        host: qdrant
        port: 6334
        api_key: ""
        use_tls: false
        connect_timeout: 10
