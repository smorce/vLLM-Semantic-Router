bert_model:
  model_id: sentence-transformers/all-MiniLM-L12-v2
  threshold: 0.6
  use_cpu: true

vllm_endpoints:
  - name: "vllm_fast"
    address: "127.0.0.1"
    port: 3849
    models: ["LiquidAI/LFM2.5-1.2B-JP"]
    weight: 1

  - name: "ollama_gpt"
    address: "172.25.240.1"
    port: 11434
    models: ["gpt-oss:20b"]
    weight: 1

model_config:
  "LiquidAI/LFM2.5-1.2B-JP":
    preferred_endpoints: ["vllm_fast"]
  "gpt-oss:20b":
    preferred_endpoints: ["ollama_gpt"]

default_model: "LiquidAI/LFM2.5-1.2B-JP"

classifier:
  category_model:
    model_id: "models/category_classifier_modernbert-base_model"
    use_modernbert: true
    threshold: 0.6
    use_cpu: true

signals:
  keywords:
    - name: "tool_or_hard_keywords"
      operator: "OR"
      case_sensitive: false
      keywords:
        - "検索"
        - "調べて"
        - "最新"
        - "URL"
        - "API"
        - "ツール"
        - "tool"
        - "function"
        - "呼び出し"
        - "実行して"
        - "設計"
        - "原因"
        - "分析"
        - "比較"
        - "提案"

  embeddings:
    - name: "simple_ja"
      threshold: 0.72
      candidates: ["こんにちは", "短く答えて", "要約して", "雑談"]
      aggregation_method: "max"

    - name: "hard_or_tool_ja"
      threshold: 0.70
      candidates:
        - "ウェブで調べて根拠を付けて"
        - "ツールやAPIを呼び出して作業して"
        - "複雑な条件で比較して提案して"
      aggregation_method: "max"

  domains:
    - name: "computer_science"
      description: "Programming / CS"
      mmlu_categories: ["computer_security", "machine_learning"]

  fact_check:
    - name: "needs_verification"
      description: "Likely needs factual verification."

  user_feedbacks:
    - name: "correction_needed"
      description: "User indicates previous answer was wrong / asks for correction."

  preferences:
    - name: "hard_or_tool"
      description: "難しい推論やツール呼び出しが必要そう"
      llm_endpoint: "http://172.25.240.1:11434"
    - name: "easy"
      description: "簡単な返答や雑談"
      llm_endpoint: "http://172.25.240.1:11434"

decisions:
  - name: "feedback_to_gpt"
    priority: 300
    rules:
      operator: "AND"
      conditions:
        - type: "user_feedback"
          name: "correction_needed"
    modelRefs:
      - model: "gpt-oss:20b"
        use_reasoning: true

  - name: "hard_or_tool_to_gpt"
    priority: 200
    rules:
      operator: "OR"
      conditions:
        - type: "keyword"
          name: "tool_or_hard_keywords"
        - type: "embedding"
          name: "hard_or_tool_ja"
        - type: "domain"
          name: "computer_science"
        - type: "fact_check"
          name: "needs_verification"
        - type: "preference"
          name: "hard_or_tool"
    modelRefs:
      - model: "gpt-oss:20b"
        use_reasoning: true

  - name: "default_to_fast"
    priority: 1
    rules:
      operator: "OR"
      conditions:
        - type: "embedding"
          name: "simple_ja"
        - type: "preference"
          name: "easy"
    modelRefs:
      - model: "LiquidAI/LFM2.5-1.2B-JP"
        use_reasoning: false
